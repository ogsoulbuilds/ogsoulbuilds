<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page not found — OGSoul Builds</title>
  <meta name="description" content="That page doesn't exist. Let's get you back home." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/Images/favicon_OGSOULBUILDS.png" />
  <link rel="apple-touch-icon" href="/Images/favicon_OGSOULBUILDS.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink: #14213D;      /* Ink Navy    */
      --signal: #2F6FED;   /* Signal Blue */
      --cloud: #F5F7FA;    /* Cloud White */
      --slate: #6B7686;    /* Slate Gray  */
      --mint: #2FCB8F;     /* Mint        */
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--ink);
      color: var(--cloud);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Wordmark — brand identity only, not navigation */
    .top {
      padding: 28px 0;
    }
    .wordmark {
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.04em;
      color: var(--cloud);
      text-decoration: none;
      white-space: nowrap;
    }

    /* Centered message */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 0 88px;
    }
    .card { max-width: 560px; }

    .eyebrow {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--signal);
      margin: 0 0 18px;
    }
    h1 {
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.02;
      font-size: clamp(48px, 10vw, 84px);
      margin: 0;
    }
    .lead {
      max-width: 40ch;
      margin: 22px auto 40px;
      font-size: clamp(17px, 2.4vw, 20px);
      color: #C7CEDC;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 17px;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .btn:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--signal);
      color: #fff;
      border: 1.5px solid var(--signal);
    }
    .btn-primary:hover { background: #235ed6; border-color: #235ed6; }

    footer {
      padding: 32px 0;
      text-align: center;
      color: var(--slate);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="top">
    <div class="wrap">
      <a href="/" class="wordmark">OGSoul&nbsp;Builds</a>
    </div>
  </header>

  <main>
    <div class="wrap card">
      <p class="eyebrow">Error 404</p>
      <h1>This page ghosted you.</h1>
      <p class="lead">That link's broken, or the page never existed. Either way, no big deal — let's get you back on track.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">Back to home</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap">© 2026 OGSoul Builds</div>
  </footer>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
